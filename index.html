<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BPJS Kesehatan Daftar Online • Chill Aja</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="theme-toggle" onclick="toggleTheme()">🌙</div>

  <main class="form-container">
    <div class="hero">
      <h1>BPJS Kesehatan</h1>
      <p>Puskesmas Plumbon</p>
      <p>Daftar sekarang, hidup lebih tenang. Gampang banget, ga ribet.</p>
    </div>

    <form id="bpjsForm" class="signup-form">
      <div class="input-wrapper">
        <label for="nama"></label>
        <input type="text" id="nama" placeholder="Nama lengkap sesuai KTP" required autocomplete="name">
      </div>

      <div class="input-wrapper">
        <label for="nik"></label>
        <input type="text" id="nik" placeholder="16 digit NIK" maxlength="16" pattern="\d{16}" required title="Harus 16 digit angka">
      </div>

      <div class="input-wrapper">
        <label for="email"></label>
        <input type="email" id="email" placeholder="Email aktif untuk konfirmasi" required autocomplete="email">
      </div>

      <div class="input-wrapper">
        <label for="hp"></label>
        <input type="tel" id="hp" placeholder="No. Hp" pattern="08[0-9]{8,12}" required autocomplete="tel">
      </div>

      <div class="input-wrapper">
        <label for="alamat"></label>
        <textarea id="alamat" placeholder="Alamat sesuai KTP" rows="3" required></textarea>
      </div>

      <div class="row">
        <div class="input-wrapper half">
          <label for="tgl_lahir"></label>
          <input type="date" id="tgl_lahir" required>
        </div>

        <div class="input-wrapper half">
          <label for="jenis_kelamin"></label>
          <select id="jenis_kelamin" required>
            <option value="" disabled selected>Pilih</option>
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>
      </div>

      <div class="input-wrapper">
        <label for="faskes"></label>
        <input type="text" id="faskes" placeholder="Nama Puskesmas / Klinik / RS" list="faskes-list" required>
        <datalist id="faskes-list">
          <option value="Puskesmas Andir">
          <option value="Puskesmas Astanaanyar">
          <option value="Puskesmas Duren Sawit">
          <option value="RS Hasan Sadikin">
          <option value="RSCM">
        </datalist>
      </div>

      <!-- Tombol Daftar Sekarang dibuat seperti contoh kamu -->
      <a href="#" class="submit-btn order-btn" id="daftarBtn"
         data-link-base="https://wa.me/62895634676667?text=">
        <span>Daftar Sekarang</span>
        <div class="btn-shine"></div>
      </a>
    </form>
  </main>

  <script src="main.js"></script>
</body>
</html>
